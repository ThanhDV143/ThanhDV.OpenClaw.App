name: Unity Package Catalog Plugin CI

on:
  push:
    branches:
      - "**"
    paths:
      - "capabilities/unity-package-catalog/plugin/**"
      - ".github/workflows/unity-package-catalog-plugin-ci.yml"
  pull_request:
    branches:
      - "**"
    paths:
      - "capabilities/unity-package-catalog/plugin/**"
      - ".github/workflows/unity-package-catalog-plugin-ci.yml"
  workflow_dispatch:

jobs:
  unity-package-catalog-plugin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: capabilities/unity-package-catalog/plugin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: capabilities/unity-package-catalog/plugin/package.json

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm test

      - name: Build TypeScript
        run: npm run build

      - name: Check plugin metadata
        run: npm run plugin:check

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: unity-package-catalog-dist
          path: |
            capabilities/unity-package-catalog/plugin/dist
            capabilities/unity-package-catalog/plugin/openclaw.plugin.json
            capabilities/unity-package-catalog/plugin/package.json
